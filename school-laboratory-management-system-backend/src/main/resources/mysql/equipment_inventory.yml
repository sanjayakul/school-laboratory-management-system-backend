databaseChangeLog:
  - changeSet:
      id: 1
      author: ShabiraM
      changes:
        - createTable:
            tableName: equipment_inventory
            columns:
              - column:
                  name: id
                  type: BIGINT AUTO_INCREMENT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: category
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: available
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: condition
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: location
                  type: VARCHAR(100)

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: created_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: created_user
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: modified_date
                  type: TIMESTAMP
                  constraints:
                    nullable: true

              - column:
                  name: modified_user
                  type: VARCHAR(100)
                  constraints:
                    nullable: true

