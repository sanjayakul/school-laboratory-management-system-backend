databaseChangeLog:
  - changeSet:
      id: 1
      author: ShabiraM
      changes:
        - createTable:
            tableName: budget_expense
            columns:
              - column:
                  name: bkp_expense_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: category_name
                  type: VARCHAR(500)
                  constraints:
                    nullable: true

              - column:
                  name: amount
                  type: DOUBLE
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: VARCHAR(500)
                  constraints:
                    nullable: true

              - column:
                  name: vendor_supplier
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: receipt_number
                  type: VARCHAR(100)
                  constraints:
                    nullable: true

              - column:
                  name: notes
                  type: VARCHAR(1000)
                  constraints:
                    nullable: true

              - column:
                  name: created_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: created_user
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: modified_date
                  type: TIMESTAMP
                  constraints:
                    nullable: true

              - column:
                  name: modified_user
                  type: VARCHAR(100)
                  constraints:
                    nullable: true

