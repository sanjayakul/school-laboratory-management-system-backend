databaseChangeLog:
  - changeSet:
      id: 1
      author: ShabiraM
      changes:
        - createTable:
            tableName: chemical_inventory_details
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: chemical_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: chemical_formula
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: unit
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: min_stock_level
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: true

              - column:
                  name: hazard_level
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: storage_location
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: cas_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: true

              - column:
                  name: supplier
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

              - column:
                  name: safety_notes
                  type: TEXT
                  constraints:
                    nullable: true

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: created_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_user
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: modified_date
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: modified_user
                  type: VARCHAR(100)
                  constraints:
                    nullable: true
